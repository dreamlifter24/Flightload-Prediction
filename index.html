<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Hub: Flight & Claw Tracker</title>
    <style>
        /* --- GLOBAL & NAV --- */
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-color: #f4f7f6; }
        nav { background-color: #2c3e50; padding: 0.8rem; display: flex; justify-content: center; gap: 20px; z-index: 2000; flex-shrink: 0; }
        nav button { background: none; border: none; color: white; font-size: 1rem; cursor: pointer; padding: 8px 20px; transition: 0.3s; border-radius: 4px; }
        nav button.active-nav { background: #3498db; font-weight: bold; }

        .main-section { display: none; flex-grow: 1; overflow: hidden; }
        .main-section.active { display: flex; }

        /* --- FLIGHTLOAD STYLES --- */
        #container { display: flex; width: 100%; height: 100%; position: relative; }
        #tabsContainer { width: 280px; border-right: 1px solid #ccc; display: flex; flex-direction: column; background: #fff; transition: width 0.3s ease; flex-shrink: 0; }
        #rightPanel { flex-grow: 1; padding: 30px; overflow-y: auto; box-sizing: border-box; }
        #hideSidebarBtn { position: absolute; top: 10px; left: 10px; z-index: 1001; background: #3498db; border: none; color: white; width: 35px; height: 35px; cursor: pointer; border-radius: 4px; }
        #tabsHeader { padding: 55px 15px 10px; border-bottom: 2px solid #eee; }
        .tabButton { display: flex; align-items: center; width: 100%; padding: 12px 15px; cursor: pointer; border: none; border-bottom: 1px solid #f0f0f0; background: none; text-align: left; box-sizing: border-box; gap: 10px; }
        .tabButton.active { background: #e8f4fd; color: #2980b9; font-weight: bold; }
        .journey-name { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .closeBtn { color: #ccc; font-size: 18px; font-weight: bold; padding: 2px 8px; border-radius: 4px; transition: 0.2s; }
        .closeBtn:hover { background-color: #fee2e2; color: #ef4444; }
        
        table { width: 100%; border-collapse: collapse; margin: 20px 0; background: white; }
        th, td { border: 1px solid #dfe6e9; padding: 12px; text-align: center; }
        th { background: #f8f9fa; }
        td[contenteditable="true"] { background-color: #fffdf0; outline: none; }
        td[contenteditable="true"]:focus { background-color: #fff9db; border: 2px solid #3498db; }
        .highlight { background-color: #dff9fb !important; font-weight: bold; border: 2px solid #3498db; }
        
        .result-box { background: #d4edda; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 5px solid #27ae60; display: none; }
        .explanation-box { background: #f1f2f6; padding: 15px; border-radius: 8px; margin-top: 20px; font-family: monospace; white-space: pre-wrap; border: 1px solid #dfe6e9; display: none; }

        /* --- CLAW MACHINE STYLES --- */
        #claw-content { flex-direction: column; width: 100%; overflow-y: auto; padding: 30px; box-sizing: border-box; padding-bottom: 120px; }
        .claw-header { display: flex; gap: 15px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 30px; align-items: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .product-card { background: white; border: 2px solid #e0e0e0; border-radius: 12px; padding: 20px; position: relative; min-height: 200px; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .product-card.locked { background-color: #f0f2f5; border: 2px dashed #bdc3c7; }
        .timestamp { font-size: 0.75rem; color: #95a5a6; margin-bottom: 5px; font-style: italic; }
        .counter-row { display: flex; align-items: center; gap: 15px; margin: 15px 0; }
        .btn-round { width: 35px; height: 35px; border-radius: 50%; border: none; background: #3498db; color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .btn-round:disabled { background: #bdc3c7; cursor: not-allowed; }
        .lock-btn { margin-top: auto; padding: 6px 12px; border-radius: 4px; border: 1px solid #bdc3c7; background: #fff; cursor: pointer; font-size: 0.85rem; width: fit-content; }
        .lock-btn.is-locked { background: #f1c40f; font-weight: bold; }
        .product-total { position: absolute; bottom: 15px; right: 20px; font-weight: bold; color: #27ae60; font-size: 1.3rem; }
        
        /* Updated Delete Icon Logic */
        .delete-prod { position: absolute; top: 10px; right: 10px; color: #ccc; cursor: pointer; font-size: 1.4rem; }
        .product-card.locked .delete-prod { display: none; } /* Hide delete when locked */
        
        .global-footer { background: #2c3e50; color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: fixed; bottom: 0; left: 0; right: 0; z-index: 2001; }
    </style>
</head>
<body>

    <nav>
        <button onclick="switchTab('home-sect')" id="nav-home" class="active-nav">Home</button>
        <button onclick="switchTab('flightload-sect')" id="nav-flight">Flightload</button>
        <button onclick="switchTab('claw-sect')" id="nav-claw">Claw Machine</button>
    </nav>

    <div id="home-sect" class="main-section active">
        <div style="padding: 50px; text-align: center; width: 100%;">
            <h1>Project Hub</h1>
            <p>Welcome. Select a subsite above to begin.</p>
        </div>
    </div>

    <div id="flightload-sect" class="main-section">
        <button id="hideSidebarBtn" onclick="toggleSidebar()">☰</button>
        <div id="container">
            <div id="tabsContainer">
                <div id="tabsHeader">
                    <button class="tabButton" onclick="selectHomeTab()">🏠 Overview</button>
                    <button onclick="addTabPrompt()" style="width:100%; margin-top:10px; padding:8px; cursor:pointer; background:#2ecc71; border:none; color:white; border-radius:4px;">+ New Journey</button>
                </div>
                <div id="tabList" style="overflow-y: auto;"></div>
            </div>

            <div id="rightPanel">
                <div id="flightHome">
                    <h2>Flight Journeys Prediction Tool</h2>
                    <p>Select or create a journey from the left sidebar.</p>
                </div>

                <div id="flightContent" style="display:none;">
                    <h2 id="journeyTitle">Journey Details</h2>
                    <div style="background:#fff; padding:20px; border-radius:8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px;">
                        <label>Flight #: <input type="text" id="fNum" style="width:80px"></label>
                        <label>Seats: <input type="number" id="fTotal" style="width:60px"></label>
                        <label>Booked: <input type="number" id="fBooked" style="width:60px"></label>
                        <label>Queue: <input type="number" id="fQueue" style="width:60px"></label>
                        <label><input type="checkbox" id="fTarget"> Targeted?</label>
                        <button onclick="addFlight()" style="padding:6px 15px; cursor:pointer; background:#2c3e50; color:white; border:none; border-radius:4px;">Add Flight</button>
                    </div>

                    <table id="fTable" style="display:none;">
                        <thead>
                            <tr><th>Flight #</th><th>Total Seats</th><th>Booked</th><th>Rem.</th><th>Queue</th><th>Target?</th><th>Rollover</th></tr>
                        </thead>
                        <tbody id="fBody" oninput="syncTableData()"></tbody>
                    </table>

                    <div id="resBox" class="result-box"></div>
                    <div id="expBox" class="explanation-box"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="claw-sect" class="main-section">
        <div id="claw-content">
            <h2>Claw Machine Attempt Tracker</h2>
            <div class="claw-header">
                <input type="text" id="pName" placeholder="Product Name" style="padding:8px; border:1px solid #ccc; border-radius:4px;">
                <input type="number" id="pCost" placeholder="Cost/Attempt ($)" step="0.5" style="padding:8px; border:1px solid #ccc; border-radius:4px;">
                <button onclick="addProduct()" style="padding:10px 20px; background:#27ae60; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">+ Create Card</button>
            </div>
            <div id="productGrid" class="product-grid"></div>
        </div>
        <div class="global-footer">
            <span>Items Tracked: <strong id="totalProds">0</strong></span>
            <span style="font-size: 1.4rem;">Grand Total Spent: <strong id="grandTotal">$0.00</strong></span>
        </div>
    </div>

    <script>
        let journeys = JSON.parse(localStorage.getItem('flightData') || '{}');
        let clawProducts = JSON.parse(localStorage.getItem('clawData') || '[]');
        let currentKey = null;

        function switchTab(id) {
            document.querySelectorAll('.main-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id.split('-')[0]).classList.add('active-nav');
        }

        /* --- FLIGHTLOAD LOGIC --- */
        function toggleSidebar() { 
            const s = document.getElementById('tabsContainer'); 
            s.style.width = (s.style.width === '0px') ? '280px' : '0px'; 
        }

        function addTabPrompt() { 
            const dep = prompt("Departure:"); const arr = prompt("Arrival:"); 
            if(!dep || !arr) return; const key = dep + " to " + arr; 
            if(!journeys[key]) journeys[key] = { flights: [] }; 
            save(); renderTabs(); selectJourney(key); 
        }

        function renderTabs() { 
            const list = document.getElementById('tabList'); list.innerHTML = ''; 
            Object.keys(journeys).forEach(key => { 
                const div = document.createElement('div'); 
                div.className = 'tabButton' + (key === currentKey ? ' active' : ''); 
                div.innerHTML = `<span class="journey-name" onclick="selectJourney('${key}')">${key}</span><span class="closeBtn" onclick="deleteJourney('${key}')">×</span>`; 
                list.appendChild(div); 
            }); 
        }

        function deleteJourney(key) { 
            if(confirm(`Delete "${key}"?`)) { 
                delete journeys[key]; if(currentKey === key) { currentKey = null; selectHomeTab(); } 
                save(); renderTabs(); 
            } 
        }

        function selectJourney(key) { 
            currentKey = key; renderTabs(); 
            document.getElementById('flightHome').style.display = 'none'; 
            document.getElementById('flightContent').style.display = 'block'; 
            document.getElementById('journeyTitle').innerText = key; 
            runPrediction(); 
        }

        function addFlight() { 
            if(!currentKey) return; 
            const f = { 
                num: document.getElementById('fNum').value || "FL"+Math.floor(Math.random()*900), 
                total: parseInt(document.getElementById('fTotal').value)||0, 
                booked: parseInt(document.getElementById('fBooked').value)||0, 
                queue: parseInt(document.getElementById('fQueue').value)||0, 
                target: document.getElementById('fTarget').checked, 
                rolled: 0 
            }; 
            journeys[currentKey].flights.push(f); save(); runPrediction(); 
            document.getElementById('fNum').value=''; document.getElementById('fTotal').value=''; 
            document.getElementById('fBooked').value=''; document.getElementById('fQueue').value=''; 
            document.getElementById('fTarget').checked=false;
        }

        function syncTableData() { 
            const rows = document.getElementById('fBody').rows; 
            const flights = []; 
            for (let i = 0; i < rows.length; i++) { 
                const cells = rows[i].cells; 
                flights.push({ 
                    num: cells[0].innerText, 
                    total: parseInt(cells[1].innerText)||0, 
                    booked: parseInt(cells[2].innerText)||0, 
                    queue: parseInt(cells[4].innerText)||0, 
                    target: cells[5].innerText.toUpperCase()==="YES", 
                    rolled: 0 
                }); 
            } 
            journeys[currentKey].flights = flights; save(); runPrediction(); 
        }

        function runPrediction() { 
            if(!currentKey) return; 
            const flights = journeys[currentKey].flights; 
            const body = document.getElementById('fBody'); 
            body.innerHTML = ''; 
            if(flights.length > 0) document.getElementById('fTable').style.display = 'table'; 
            else { document.getElementById('fTable').style.display = 'none'; return; }
            
            let rollover = 0; let successIdx = -1; let log = "PREDICTION STEPS:\n"; 
            flights.forEach((f, i) => { 
                let rem = f.total - f.booked; let totalQ = f.queue + rollover; 
                if(rem > totalQ) { rollover = 0; if(successIdx === -1 && f.target) successIdx = i; } 
                else { rollover = totalQ - rem; } 
                f.rolled = rollover; 
                const row = body.insertRow(); 
                if (i === successIdx) row.className = 'highlight'; 
                row.innerHTML = `<td contenteditable="true">${f.num}</td><td contenteditable="true">${f.total}</td><td contenteditable="true">${f.booked}</td><td>${rem}</td><td contenteditable="true">${f.queue}</td><td contenteditable="true">${f.target?'YES':'NO'}</td><td>${f.rolled}</td>`; 
                log += `Flight ${f.num}: Rollover from here is ${rollover}\n`;
            }); 
            document.getElementById('resBox').style.display='block'; 
            document.getElementById('expBox').style.display='block'; 
            document.getElementById('resBox').innerHTML = successIdx !== -1 ? `<strong>Prediction:</strong> Boarding Success on ${flights[successIdx].num}` : "<strong>Prediction:</strong> No boarding window found."; 
            document.getElementById('expBox').innerText = log; 
        }

        function selectHomeTab() { currentKey = null; renderTabs(); document.getElementById('flightHome').style.display = 'block'; document.getElementById('flightContent').style.display = 'none'; }
        function save() { localStorage.setItem('flightData', JSON.stringify(journeys)); }

        /* --- CLAW MACHINE LOGIC --- */
        function addProduct() {
            const name = document.getElementById('pName').value.trim();
            const cost = parseFloat(document.getElementById('pCost').value);
            if(!name || isNaN(cost)) return alert("Please enter name and cost.");
            const now = new Date();
            const timeStr = now.toLocaleDateString() + " " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const product = { id: Date.now(), name: name, cost: cost, attempts: 0, date: timeStr, locked: false };
            clawProducts.push(product);
            saveClaw(); renderClaw();
            document.getElementById('pName').value = ''; document.getElementById('pCost').value = '';
        }

        function toggleLock(id) {
            const p = clawProducts.find(x => x.id === id);
            if(p) { p.locked = !p.locked; saveClaw(); renderClaw(); }
        }

        function updateAttempts(id, delta) {
            const p = clawProducts.find(x => x.id === id);
            if(p && !p.locked) { p.attempts = Math.max(0, p.attempts + delta); saveClaw(); renderClaw(); }
        }

        function deleteProduct(id) {
            const p = clawProducts.find(x => x.id === id);
            if(!p) return;
            if(p.locked) return; // EXTRA SAFETY: Prevent deletion if locked via logic
            if(confirm("Delete this card and its history?")) { clawProducts = clawProducts.filter(x => x.id !== id); saveClaw(); renderClaw(); }
        }

        function renderClaw() {
            const grid = document.getElementById('productGrid'); grid.innerHTML = '';
            let grandTotal = 0;
            clawProducts.forEach(p => {
                const total = p.attempts * p.cost; grandTotal += total;
                const card = document.createElement('div');
                card.className = 'product-card' + (p.locked ? ' locked' : '');
                card.innerHTML = `
                    <span class="delete-prod" onclick="deleteProduct(${p.id})">×</span>
                    <div class="timestamp">Started: ${p.date}</div>
                    <h3>${p.name}</h3>
                    <div style="color:#7f8c8d; font-size:0.9rem;">$${p.cost.toFixed(2)} / attempt</div>
                    <div class="counter-row">
                        <button class="btn-round" ${p.locked ? 'disabled' : ''} onclick="updateAttempts(${p.id}, -1)">-</button>
                        <span style="font-size:1.6rem; font-weight:bold; min-width:40px; text-align:center;">${p.attempts}</span>
                        <button class="btn-round" ${p.locked ? 'disabled' : ''} onclick="updateAttempts(${p.id}, 1)">+</button>
                    </div>
                    <button class="lock-btn ${p.locked ? 'is-locked' : ''}" onclick="toggleLock(${p.id})">${p.locked ? '🔓 Unlock to Edit' : '🔒 Lock Card'}</button>
                    <div class="product-total">$${total.toFixed(2)}</div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('totalProds').innerText = clawProducts.length;
            document.getElementById('grandTotal').innerText = '$' + grandTotal.toFixed(2);
        }

        function saveClaw() { localStorage.setItem('clawData', JSON.stringify(clawProducts)); }

        window.onload = () => { renderTabs(); renderClaw(); };
    </script>
</body>
</html>
