<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Hub: Mobile Optimized</title>
    <style>
        /* --- GLOBAL & NAV --- */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; background-color: #f4f7f6; overflow: hidden; }
        
        nav { background-color: #2c3e50; padding: 10px; display: flex; justify-content: space-around; z-index: 3000; flex-shrink: 0; }
        nav button { background: none; border: none; color: #bdc3c7; font-size: 0.9rem; padding: 10px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        nav button.active-nav { background: #3498db; color: white; font-weight: bold; }

        .main-section { display: none; flex-grow: 1; overflow: hidden; position: relative; }
        .main-section.active { display: flex; flex-direction: column; }

        /* --- RESPONSIVE SIDEBAR (FLIGHTLOAD) --- */
        #container { display: flex; width: 100%; height: 100%; }
        
        #tabsContainer { 
            width: 280px; background: white; border-right: 1px solid #ccc; 
            display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1500;
        }

        /* Mobile specific sidebar behavior */
        @media (max-width: 768px) {
            #tabsContainer {
                position: absolute; left: -280px; height: 100%; width: 260px; box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            }
            #tabsContainer.open { left: 0; }
            #rightPanel { width: 100% !important; padding: 15px !important; }
        }

        #rightPanel { flex-grow: 1; padding: 25px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        #hideSidebarBtn { 
            position: fixed; bottom: 85px; right: 20px; z-index: 1600; 
            background: #3498db; color: white; border: none; width: 50px; height: 50px; 
            border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 1.5rem;
        }

        /* --- TABLE RESPONSIVENESS --- */
        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #dfe6e9; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 600px; }
        th, td { padding: 12px 8px; font-size: 0.9rem; text-align: center; border-bottom: 1px solid #eee; }
        
        /* --- CLAW MACHINE GRID --- */
        #claw-content { padding: 15px; overflow-y: auto; padding-bottom: 150px; }
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); 
            gap: 15px; 
        }
        @media (min-width: 600px) { .product-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); } }

        .product-card { background: white; border-radius: 15px; padding: 20px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .product-card.locked { background: #f8f9fa; border: 2px dashed #cbd5e0; }
        
        /* --- INPUTS & BUTTONS --- */
        .input-group { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { font-size: 16px !important; padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn-main { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; }

        .global-footer { 
            background: #2c3e50; color: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            position: fixed; bottom: 0; width: 100%; box-sizing: border-box; z-index: 2500;
        }
    </style>
</head>
<body>

    <nav>
        <button onclick="switchTab('home-sect')" id="nav-home" class="active-nav">Home</button>
        <button onclick="switchTab('flightload-sect')" id="nav-flight">Flights</button>
        <button onclick="switchTab('claw-sect')" id="nav-claw">Claw</button>
    </nav>

    <button id="hideSidebarBtn" onclick="toggleSidebar()">☰</button>

    <div id="home-sect" class="main-section active">
        <div style="padding: 40px; text-align: center;">
            <h1 style="color: #2c3e50;">Project Hub</h1>
            <p style="color: #7f8c8d;">Optimized for Mobile Use</p>
            <div style="margin-top: 30px; font-size: 3rem;">📱✈️🕹️</div>
        </div>
    </div>

    <div id="flightload-sect" class="main-section">
        <div id="container">
            <div id="tabsContainer">
                <div style="padding: 20px;">
                    <button class="btn-main" onclick="addTabPrompt()">+ New Journey</button>
                    <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
                    <div id="tabList"></div>
                </div>
            </div>
            <div id="rightPanel">
                <div id="flightHome"><h3>Select Journey</h3></div>
                <div id="flightContent" style="display:none;">
                    <h2 id="journeyTitle" style="margin-top:0;"></h2>
                    <div class="input-group">
                        <input type="text" id="fNum" placeholder="Flight #">
                        <div style="display:flex; gap:10px;">
                            <input type="number" id="fTotal" placeholder="Seats">
                            <input type="number" id="fBooked" placeholder="Booked">
                        </div>
                        <input type="number" id="fQueue" placeholder="Queue Size">
                        <label style="display:block; margin-bottom:10px;"><input type="checkbox" id="fTarget"> Targeted Flight</label>
                        <button class="btn-main" style="background:#2c3e50;" onclick="addFlight()">Add Flight</button>
                    </div>
                    
                    <div class="table-wrapper">
                        <table id="fTable">
                            <thead><tr><th>#</th><th>Seats</th><th>Bkd</th><th>Rem</th><th>Que</th><th>Tgt</th><th>Roll</th></tr></thead>
                            <tbody id="fBody" oninput="syncTableData()"></tbody>
                        </table>
                    </div>
                    <div id="resBox" style="background:#d4edda; padding:15px; border-radius:8px; margin-top:15px; display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="claw-sect" class="main-section">
        <div id="claw-content">
            <div class="input-group">
                <input type="text" id="pName" placeholder="Prize Name">
                <input type="number" id="pCost" placeholder="Cost per Play ($)" step="0.5">
                <button class="btn-main" onclick="addProduct()">+ Start Tracking</button>
            </div>
            <div id="productGrid" class="product-grid"></div>
        </div>
        <div class="global-footer">
            <span id="totalProds">0 Items</span>
            <span style="font-size: 1.1rem; font-weight: bold;" id="grandTotal">$0.00</span>
        </div>
    </div>

    <script>
        // DATA & CORE LOGIC
        let journeys = JSON.parse(localStorage.getItem('flightData') || '{}');
        let clawProducts = JSON.parse(localStorage.getItem('clawData') || '[]');
        let currentKey = null;

        function switchTab(id) {
            document.querySelectorAll('.main-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id.split('-')[0]).classList.add('active-nav');
            // Hide sidebar floating button if not on flights
            document.getElementById('hideSidebarBtn').style.display = (id === 'flightload-sect') ? 'block' : 'none';
        }

        /* --- MOBILE SIDEBAR --- */
        function toggleSidebar() {
            document.getElementById('tabsContainer').classList.toggle('open');
        }

        /* --- FLIGHTLOAD --- */
        function addTabPrompt() {
            const dep = prompt("Departure City:"); const arr = prompt("Arrival City:");
            if(!dep || !arr) return; const key = dep + " to " + arr;
            if(!journeys[key]) journeys[key] = { flights: [] };
            save(); renderTabs(); selectJourney(key);
            if(window.innerWidth < 768) toggleSidebar();
        }

        function renderTabs() {
            const list = document.getElementById('tabList'); list.innerHTML = '';
            Object.keys(journeys).forEach(key => {
                const div = document.createElement('div');
                div.style = "padding:12px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; cursor:pointer;";
                if(key === currentKey) div.style.background = "#e8f4fd";
                div.innerHTML = `<span onclick="selectJourney('${key}'); if(window.innerWidth < 768) toggleSidebar();">${key}</span>
                                 <span style="color:#e74c3c; padding:5px;" onclick="deleteJourney('${key}')">×</span>`;
                list.appendChild(div);
            });
        }

        function selectJourney(key) {
            currentKey = key; renderTabs();
            document.getElementById('flightHome').style.display = 'none';
            document.getElementById('flightContent').style.display = 'block';
            document.getElementById('journeyTitle').innerText = key;
            runPrediction();
        }

        function addFlight() {
            if(!currentKey) return;
            journeys[currentKey].flights.push({
                num: document.getElementById('fNum').value || "FL"+Math.floor(Math.random()*900),
                total: parseInt(document.getElementById('fTotal').value)||0,
                booked: parseInt(document.getElementById('fBooked').value)||0,
                queue: parseInt(document.getElementById('fQueue').value)||0,
                target: document.getElementById('fTarget').checked
            });
            save(); runPrediction();
            document.getElementById('fNum').value=''; document.getElementById('fTotal').value='';
            document.getElementById('fBooked').value=''; document.getElementById('fQueue').value='';
            document.getElementById('fTarget').checked=false;
        }

        function runPrediction() {
            const fBody = document.getElementById('fBody'); fBody.innerHTML = '';
            const flights = journeys[currentKey]?.flights || [];
            if(flights.length > 0) document.getElementById('fTable').style.display = 'table';
            let rollover = 0; let successIdx = -1;

            flights.forEach((f, i) => {
                let rem = f.total - f.booked; let totalQ = f.queue + rollover;
                if(rem > totalQ) { rollover = 0; if(successIdx === -1 && f.target) successIdx = i; }
                else { rollover = totalQ - rem; }
                const row = fBody.insertRow();
                if(i === successIdx) row.style.background = "#dff9fb";
                row.innerHTML = `<td contenteditable="true">${f.num}</td><td contenteditable="true">${f.total}</td><td contenteditable="true">${f.booked}</td><td>${rem}</td><td contenteditable="true">${f.queue}</td><td>${f.target?'Y':'N'}</td><td>${rollover}</td>`;
            });
            const res = document.getElementById('resBox');
            res.style.display = 'block';
            res.innerHTML = successIdx !== -1 ? `<strong>Success:</strong> ${flights[successIdx].num}` : "No Window Found";
        }

        function syncTableData() {
            const rows = document.getElementById('fBody').rows;
            journeys[currentKey].flights = Array.from(rows).map(r => ({
                num: r.cells[0].innerText, total: parseInt(r.cells[1].innerText),
                booked: parseInt(r.cells[2].innerText), queue: parseInt(r.cells[4].innerText),
                target: r.cells[5].innerText.toUpperCase() === 'Y'
            }));
            save(); runPrediction();
        }

        /* --- CLAW MACHINE --- */
        function addProduct() {
            const name = document.getElementById('pName').value;
            const cost = parseFloat(document.getElementById('pCost').value);
            if(!name || isNaN(cost)) return alert("Set Name and Cost");
            clawProducts.push({ id: Date.now(), name, cost, attempts: 0, locked: false, date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            saveClaw(); renderClaw();
            document.getElementById('pName').value = ''; document.getElementById('pCost').value = '';
        }

        function renderClaw() {
            const grid = document.getElementById('productGrid'); grid.innerHTML = '';
            let totalSpent = 0;
            clawProducts.forEach(p => {
                totalSpent += (p.attempts * p.cost);
                const card = document.createElement('div');
                card.className = `product-card ${p.locked ? 'locked' : ''}`;
                card.innerHTML = `
                    ${p.locked ? '' : `<span style="position:absolute; top:10px; right:15px; color:#ccc;" onclick="deleteClaw(${p.id})">×</span>`}
                    <div style="font-size:0.7rem; color:#95a5a6; margin-bottom:5px;">${p.date}</div>
                    <h3 style="margin:0 0 10px 0;">${p.name}</h3>
                    <div style="display:flex; align-items:center; gap:20px; margin-bottom:15px;">
                        <button class="btn-round" ${p.locked?'disabled':''} onclick="updClaw(${p.id},-1)">-</button>
                        <span style="font-size:1.5rem; font-weight:bold;">${p.attempts}</span>
                        <button class="btn-round" ${p.locked?'disabled':''} onclick="updClaw(${p.id},1)">+</button>
                    </div>
                    <button class="btn-main" style="background:${p.locked?'#f1c40f':'#eee'}; color:${p.locked?'black':'#666'}; width:auto; padding:5px 15px;" onclick="toggleClawLock(${p.id})">
                        ${p.locked ? '🔓 Unlock' : '🔒 Lock'}
                    </button>
                    <div style="position:absolute; bottom:20px; right:20px; font-weight:bold; color:#27ae60;">$${(p.attempts*p.cost).toFixed(2)}</div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('totalProds').innerText = `${clawProducts.length} Items`;
            document.getElementById('grandTotal').innerText = `$${totalSpent.toFixed(2)}`;
        }

        function updClaw(id, d) { const p = clawProducts.find(x=>x.id===id); if(p && !p.locked){ p.attempts = Math.max(0, p.attempts+d); saveClaw(); renderClaw(); } }
        function toggleClawLock(id) { const p = clawProducts.find(x=>x.id===id); if(p){ p.locked = !p.locked; saveClaw(); renderClaw(); } }
        function deleteClaw(id) { if(confirm("Delete?")){ clawProducts = clawProducts.filter(x=>x.id!==id); saveClaw(); renderClaw(); } }

        function save() { localStorage.setItem('flightData', JSON.stringify(journeys)); }
        function saveClaw() { localStorage.setItem('clawData', JSON.stringify(clawProducts)); }
        function deleteJourney(k) { delete journeys[k]; save(); renderTabs(); selectHomeTab(); }
        function selectHomeTab() { currentKey=null; document.getElementById('flightContent').style.display='none'; document.getElementById('flightHome').style.display='block'; renderTabs(); }

        window.onload = () => { renderTabs(); renderClaw(); switchTab('home-sect'); };
    </script>
</body>
</html>
